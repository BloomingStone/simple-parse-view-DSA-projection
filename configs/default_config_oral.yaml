    # pretrain_model_path: "/media/I/xcw/3DGR-CAR-main/ckpt_oral"
    dataset: "CAS"
    num_proj: 16
    # gaussian_predictor_pretrained_model: "paper_modelv13++.pth"
    gaussian_predictor_pretrained_model: "paper_modelv13++.pth"
    num_init_gaussian: 4000
    max_iter: 8000
    save_dir: "/media/I/xcw/3DGR-CAR-main/3dgs-car/gaussian_gcp_result_16view"
    # pretrain_model_path: "/media/I/xcw/3DGR-CAR-main/ckpt_oral"
    pretrain_model_path: "/media/I/xcw/3DGR-CAR-main/ckpt_oral"

comparison_cas:
  dataset: "CAS"
  num_proj: 2
  gaussian_predictor_pretrained_model: "paper_modelv13++_cas.pth"
  num_init_gaussian: 8000
  max_iter: 8000
  save_dir: "/data/xuemingfu/NeRP/gaussian_splatter_result_new"
  pretrain_model_path: "/data/xuemingfu/NeRP/gaussian_splatter3_pretrain_model_new"

comparison_bk:
  dataset: "CCTA"
  num_proj: 2
